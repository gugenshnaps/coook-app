    <!-- Header с аватаром и выбором города -->

            </div>
            <div class="user-details">
                <div id="userName" class="user-name">Carregando...</div>
                <div class="user-status">Online</div>
            </div>
        </div>
        
        <!-- Правая часть - выбор города -->
        <div class="city-selector">
            <select id="citySelect" class="city-select">
                <option value="">Carregando cidades...</option>
            </select>
            <button id="showAllCafes" class="btn-show-all" style="display: none;">Mostrar todos</button>
        </div>
    </header>

            <!-- Основной контент -->
        <main class="main-content">
                    <!-- Меню приложения -->
        <div class="app-menu">
            <button class="menu-item loyalty-btn">
                <span class="menu-icon">🎯</span>
                <span class="menu-text">Minha Lealdade</span>
            </button>
            <button class="menu-item favorites-btn">
                <span class="menu-icon">❤️</span>
                <span class="menu-text">Favoritos</span>
            </button>
        </div>
        
        <!-- Список кафе -->
        <div id="cafesList" class="cafes-list">
            <div class="loading">Selecione uma cidade para ver os cafés</div>
        </div>
        
        <!-- Сообщение об отсутствии кафе -->
        <div id="noCafes" class="no-cafes" style="display: none;">
            <p>Nenhum café encontrado nesta cidade</p>
        </div>
    </main>

    <!-- Модальное окно с деталями кафе -->
    <div id="modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="modalContent"></div>
        </div>
    </div>

    <!-- QR Code Library - Using QR-Server API (free and reliable) -->
    <script>
        console.log('🔍 Using QR-Server API for QR codes - no external libraries needed!');
    </script>
    <script>
        // Check if library loaded
        setTimeout(() => {
            console.log('🔍 QR Library check after 2 seconds:');
            console.log('   - window.QRCode:', !!window.QRCode);
            console.log('   - window.qrcode:', !!window.qrcode);
            console.log('   - window.qrcodeGenerator:', !!window.qrcodeGenerator);
            
            if (window.QRCode) {
                console.log('✅ QRCode library loaded successfully');
            } else if (window.qrcode) {
                console.log('✅ qrcode library loaded successfully');
            } else {
                console.error('❌ No QR libraries loaded');
            }
        }, 2000);
    </script>
    
    <script src="user-system.js"></script>
    <script src="script.js"></script>
</body>
</html>
